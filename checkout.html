<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipment Check Out | Patrick Accounting</title>
<link rel="icon" href="/assets/favicon.png" type="image/png">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2d3142;
  --text: #e2e4e9;
  --text2: #9ca0ab;
  --accent: #8cb86e;
  --accent-dim: rgba(140,184,110,0.15);
  --danger: #e85d5d;
  --blue: #5b8def;
  --orange: #e8944a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; }

.top-bar { width:100%; padding:14px 20px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
.top-bar img { height:26px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:100%; max-width:420px; margin:28px 16px; overflow:hidden; }
.card-header { padding:20px 20px 16px; border-bottom:1px solid var(--border); text-align:center; }
.device-number { font-size:28px; font-weight:800; color:var(--blue); letter-spacing:1px; }
.device-name { font-size:15px; color:var(--text2); margin-top:4px; }

.status-section { padding:20px; text-align:center; }
.big-badge { display:inline-flex; align-items:center; gap:6px; padding:8px 20px; border-radius:24px; font-size:14px; font-weight:700; }
.big-badge.available { background:var(--accent-dim); color:var(--accent); }
.big-badge.checked-out { background:rgba(232,148,74,.15); color:var(--orange); }

.checked-info { margin-top:14px; font-size:13px; color:var(--text2); }
.checked-info strong { color:var(--text); }

/* Form */
.form-section { padding:0 20px 20px; }
.form-section label { display:block; font-size:12px; color:var(--text2); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; font-weight:600; }
.form-section input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:12px 14px; border-radius:10px; font-size:16px; outline:none; margin-bottom:12px; -webkit-appearance:none; }
.form-section input:focus { border-color:var(--accent); }
.form-section input::placeholder { color:var(--text2); }

.action-btn { width:100%; padding:14px; border-radius:10px; border:none; font-size:16px; font-weight:600; cursor:pointer; transition:all .15s; }
.action-btn.checkout { background:var(--blue); color:#fff; }
.action-btn.checkout:hover { background:#6b9aef; }
.action-btn.checkout:disabled { opacity:.5; cursor:not-allowed; }
.action-btn.checkin { background:var(--accent); color:#111; }
.action-btn.checkin:hover { background:#9cc67e; }

/* Success / Error states */
.result-section { padding:24px 20px; text-align:center; display:none; }
.result-icon { font-size:48px; margin-bottom:10px; }
.result-msg { font-size:16px; font-weight:600; margin-bottom:6px; }
.result-sub { font-size:13px; color:var(--text2); }

/* Loading */
.loading-state { padding:60px 20px; text-align:center; color:var(--text2); }
.error-state { padding:40px 20px; text-align:center; }
.error-state h3 { color:var(--danger); margin-bottom:6px; }
.error-state p { color:var(--text2); font-size:14px; }

/* Spinner */
.spinner { display:inline-block; width:20px; height:20px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }

.back-link { display:block; text-align:center; padding:16px; color:var(--text2); font-size:13px; text-decoration:none; }
.back-link:hover { color:var(--text); }
</style>
</head>
<body>

<div class="top-bar">
  <img src="/assets/logo.png" alt="Patrick Accounting">
</div>

<div class="card" id="mainCard">
  <div class="loading-state" id="loadingState">Loading device...</div>

  <!-- Error state -->
  <div class="error-state" id="errorState" style="display:none;">
    <h3 id="errorTitle">Device Not Found</h3>
    <p id="errorMsg">This QR code doesn't match any device.</p>
  </div>

  <!-- Device loaded - header always shown -->
  <div id="deviceContent" style="display:none;">
    <div class="card-header">
      <div class="device-number" id="devNumber"></div>
      <div class="device-name" id="devName"></div>
    </div>

    <!-- Status display -->
    <div class="status-section" id="statusSection">
      <div id="statusBadge"></div>
      <div class="checked-info" id="checkedInfo"></div>
    </div>

    <!-- Checkout form (shown when available) -->
    <div class="form-section" id="checkoutForm" style="display:none;">
      <label>Your Name</label>
      <input type="text" id="employeeName" placeholder="Enter your name" autocomplete="name">
      <button class="action-btn checkout" id="checkoutBtn" onclick="doCheckout()" disabled>Check Out This Device</button>
    </div>

    <!-- Checkin button (shown when checked out) -->
    <div class="form-section" id="checkinForm" style="display:none;">
      <button class="action-btn checkin" onclick="doCheckin()">Return This Device</button>
    </div>

    <!-- Result state (success/error after action) -->
    <div class="result-section" id="resultSection">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-msg" id="resultMsg"></div>
      <div class="result-sub" id="resultSub"></div>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  var API_BASE = "https://standing-malamute-183.convex.site";
  var params = new URLSearchParams(window.location.search);
  var deviceNumber = params.get("d") || params.get("device") || params.get("number") || "";
  var currentDevice = null;

  if (!deviceNumber) {
    showError("No Device Specified", "Scan a QR code on a device to check it out or return it.");
    return;
  }

  // Load device info
  fetch(API_BASE + "/equipment/public/device?number=" + encodeURIComponent(deviceNumber))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        if (data.error === "device_not_found") {
          showError("Device Not Found", '"' + deviceNumber + '" doesn\'t match any tracked device.');
        } else {
          showError("Error", data.error);
        }
        return;
      }
      currentDevice = data.device;
      renderDevice();
    })
    .catch(function() {
      showError("Connection Error", "Could not reach the server. Check your internet connection.");
    });

  function renderDevice() {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("deviceContent").style.display = "block";
    document.getElementById("devNumber").textContent = currentDevice.deviceNumber;
    document.getElementById("devName").textContent = currentDevice.deviceName;

    if (currentDevice.status === "available") {
      document.getElementById("statusBadge").innerHTML = '<span class="big-badge available">&#x25CF; Available</span>';
      document.getElementById("checkedInfo").textContent = "";
      document.getElementById("checkoutForm").style.display = "block";
      document.getElementById("checkinForm").style.display = "none";
    } else {
      document.getElementById("statusBadge").innerHTML = '<span class="big-badge checked-out">&#x25CF; Checked Out</span>';
      var since = currentDevice.checkedOutAt ? formatDate(currentDevice.checkedOutAt) : "";
      document.getElementById("checkedInfo").innerHTML = "Held by <strong>" + escHtml(currentDevice.checkedOutByName || "Unknown") + "</strong>" + (since ? " since " + since : "");
      document.getElementById("checkoutForm").style.display = "none";
      document.getElementById("checkinForm").style.display = "block";
    }
  }

  // Enable checkout button when name is entered
  var nameInput = document.getElementById("employeeName");
  nameInput.addEventListener("input", function() {
    document.getElementById("checkoutBtn").disabled = !nameInput.value.trim();
  });

  // Checkout
  window.doCheckout = function() {
    var name = nameInput.value.trim();
    if (!name) return;

    var btn = document.getElementById("checkoutBtn");
    btn.innerHTML = '<span class="spinner"></span>Checking out...';
    btn.disabled = true;

    fetch(API_BASE + "/equipment/public/checkout", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ deviceNumber: deviceNumber, employeeName: name }),
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          showResult("error", data.error === "Device already checked out" ? "Already Checked Out" : data.error, "Someone else may have grabbed it. Refresh to check.");
          return;
        }
        showResult("success", "Checked Out!", name + " now has " + currentDevice.deviceNumber);
      })
      .catch(function() {
        showResult("error", "Failed", "Could not complete checkout. Try again.");
        btn.innerHTML = "Check Out This Device";
        btn.disabled = false;
      });
  };

  // Checkin
  window.doCheckin = function() {
    var checkinBtn = document.querySelector("#checkinForm .action-btn");
    checkinBtn.innerHTML = '<span class="spinner"></span>Returning...';
    checkinBtn.disabled = true;

    fetch(API_BASE + "/equipment/public/checkin", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ deviceNumber: deviceNumber }),
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          showResult("error", "Error", data.error);
          return;
        }
        showResult("success", "Returned!", currentDevice.deviceNumber + " is now available");
      })
      .catch(function() {
        showResult("error", "Failed", "Could not complete return. Try again.");
        checkinBtn.innerHTML = "Return This Device";
        checkinBtn.disabled = false;
      });
  };

  function showResult(type, msg, sub) {
    document.getElementById("statusSection").style.display = "none";
    document.getElementById("checkoutForm").style.display = "none";
    document.getElementById("checkinForm").style.display = "none";
    var section = document.getElementById("resultSection");
    section.style.display = "block";
    document.getElementById("resultIcon").textContent = type === "success" ? "\u2705" : "\u274C";
    document.getElementById("resultMsg").textContent = msg;
    document.getElementById("resultSub").textContent = sub || "";
  }

  function showError(title, msg) {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "block";
    document.getElementById("errorTitle").textContent = title;
    document.getElementById("errorMsg").textContent = msg;
  }

  function formatDate(ts) {
    var d = new Date(ts);
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return months[d.getMonth()] + " " + d.getDate();
  }

  function escHtml(s) {
    if (!s) return "";
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
})();
</script>
</body>
</html>
