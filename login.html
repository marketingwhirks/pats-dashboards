<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - PATS Dashboards</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    background:#0d1117;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:#e0e0e0;
  }
  .login-card {
    background:rgba(26,31,46,0.95);
    border:1px solid rgba(74,144,226,0.2);
    border-radius:16px;
    padding:48px 40px;
    text-align:center;
    max-width:420px;
    width:90%;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
  }
  .logo {
    margin-bottom:8px;
  }
  .logo img {
    max-width:280px;
    height:auto;
  }
  .logo-subtitle {
    font-size:22px;
    font-weight:700;
    color:#8cb86e;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:4px;
  }
  .subtitle {
    font-size:14px;
    color:#888;
    margin-bottom:36px;
  }
  .slack-btn {
    display:inline-flex;
    align-items:center;
    gap:12px;
    background:#4A154B;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:14px 32px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
    transition:all 0.2s;
  }
  .slack-btn:hover {
    background:#611f69;
    transform:translateY(-1px);
    box-shadow:0 4px 16px rgba(74,21,75,0.4);
  }
  .slack-btn svg { width:22px; height:22px; }
  .error-msg {
    background:rgba(255,59,48,0.15);
    border:1px solid rgba(255,59,48,0.3);
    color:#ff6b6b;
    border-radius:8px;
    padding:12px 16px;
    margin-bottom:24px;
    font-size:13px;
    display:none;
  }
  .footer {
    margin-top:32px;
    font-size:12px;
    color:#555;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo"><img src="/assets/logo.png" alt="Patrick Accounting"></div>
  <div class="logo-subtitle">Dashboards</div>
  <div class="subtitle">Internal Dashboards</div>

  <div class="error-msg" id="errorMsg"></div>

  <a class="slack-btn" id="slackBtn" href="#">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zm1.271 0a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313z" fill="#E01E5A"/>
      <path d="M8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.521 2.522v2.52H8.834zm0 1.271a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312z" fill="#36C5F0"/>
      <path d="M18.956 8.834a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.528 2.528 0 0 1-2.522 2.521h-2.522V8.834zm-1.27 0a2.528 2.528 0 0 1-2.522 2.521 2.528 2.528 0 0 1-2.52-2.521V2.522A2.528 2.528 0 0 1 15.165 0a2.528 2.528 0 0 1 2.521 2.522v6.312z" fill="#2EB67D"/>
      <path d="M15.165 18.956a2.528 2.528 0 0 1 2.521 2.522A2.528 2.528 0 0 1 15.165 24a2.528 2.528 0 0 1-2.52-2.522v-2.522h2.52zm0-1.27a2.528 2.528 0 0 1-2.52-2.522 2.528 2.528 0 0 1 2.52-2.52h6.313A2.528 2.528 0 0 1 24 15.165a2.528 2.528 0 0 1-2.522 2.521h-6.313z" fill="#ECB22E"/>
    </svg>
    Sign in with Slack
  </a>

  <div class="footer">
    Restricted to @patrickaccounting.com and @whirks.com accounts
  </div>
</div>

<script>
  const AUTH_BASE = "https://standing-malamute-183.convex.site";

  // Check for error in URL
  const params = new URLSearchParams(window.location.search);
  const error = params.get("error");
  if (error) {
    const errorEl = document.getElementById("errorMsg");
    const messages = {
      "unauthorized_domain": "Your email domain is not authorized. Only @patrickaccounting.com and @whirks.com accounts can sign in.",
      "no_email": "Could not retrieve your email from Slack. Please try again.",
      "token_exchange_failed": "Authentication failed. Please try again.",
      "access_denied": "You denied the sign-in request.",
      "no_code": "No authorization code received. Please try again.",
    };
    errorEl.textContent = messages[error] || "Sign-in failed: " + error;
    errorEl.style.display = "block";
  }

  // If already authenticated, redirect to dashboard
  const token = localStorage.getItem("pats_session_token");
  if (token) {
    fetch(AUTH_BASE + "/auth/verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.valid) {
        window.location.href = params.get("redirect") || "/";
      }
    })
    .catch(() => {});
  }

  // Set up Slack button
  const redirect = params.get("redirect") || "/";
  const slackUrl = AUTH_BASE + "/auth/slack?redirect=" + encodeURIComponent("https://dashboards.patrickaccounting.com" + redirect);
  document.getElementById("slackBtn").href = slackUrl;
</script>
</body>
</html>
