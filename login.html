<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Patrick Accounting Dashboards</title>
<script src="/theme.js"></script>
<link rel="stylesheet" href="/theme.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    transition: background 0.3s, color 0.3s;
  }

  /* Light mode (default) */
  html[data-theme="light"] body {
    background: #f5f6f8 !important;
    color: #1a1a2e;
  }
  html[data-theme="light"] .login-card {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  html[data-theme="light"] .logo-subtitle { color: #2d6a2e; }
  html[data-theme="light"] .subtitle { color: #888; }
  html[data-theme="light"] .footer { color: #999; }

  /* Dark mode */
  html[data-theme="dark"] body {
    background: #0d1117 !important;
    color: #e0e0e0;
  }
  html[data-theme="dark"] .login-card {
    background: rgba(26,31,46,0.95);
    border: 1px solid rgba(74,144,226,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  html[data-theme="dark"] .logo-subtitle { color: #8cb86e; }
  html[data-theme="dark"] .subtitle { color: #888; }
  html[data-theme="dark"] .footer { color: #555; }

  .login-card {
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    position: relative;
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }

  .theme-toggle-login {
    position: absolute;
    top: 16px;
    right: 16px;
  }

  .logo {
    margin-bottom: 8px;
  }
  .logo img {
    max-width: 280px;
    height: auto;
  }
  .logo-subtitle {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
    transition: color 0.3s;
  }
  .subtitle {
    font-size: 14px;
    margin-bottom: 36px;
    transition: color 0.3s;
  }

  .slack-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: #4A154B;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }
  .slack-btn:hover {
    background: #611f69;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(74,21,75,0.4);
  }
  .slack-btn svg { width:22px; height:22px; }

  .error-msg {
    background: rgba(255,59,48,0.1);
    border: 1px solid rgba(255,59,48,0.25);
    color: #dc2626;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 13px;
    display: none;
  }
  html[data-theme="dark"] .error-msg {
    background: rgba(255,59,48,0.15);
    border-color: rgba(255,59,48,0.3);
    color: #ff6b6b;
  }

  .footer {
    margin-top: 32px;
    font-size: 12px;
    transition: color 0.3s;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="theme-toggle-login">
    <button class="theme-toggle-btn" onclick="patsTheme.toggle()" title="Toggle theme">
      <!-- Filled by theme.js -->
    </button>
  </div>

  <div class="logo">
    <img data-logo src="/assets/logo.png" alt="Patrick Accounting">
  </div>
  <div class="logo-subtitle">Dashboards</div>
  <div class="subtitle">Internal Dashboards</div>

  <div class="error-msg" id="errorMsg"></div>

  <a class="slack-btn" id="slackBtn" href="#">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zm1.271 0a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313z" fill="#E01E5A"/>
      <path d="M8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.521 2.522v2.52H8.834zm0 1.271a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312z" fill="#36C5F0"/>
      <path d="M18.956 8.834a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.528 2.528 0 0 1-2.522 2.521h-2.522V8.834zm-1.27 0a2.528 2.528 0 0 1-2.522 2.521 2.528 2.528 0 0 1-2.52-2.521V2.522A2.528 2.528 0 0 1 15.165 0a2.528 2.528 0 0 1 2.521 2.522v6.312z" fill="#2EB67D"/>
      <path d="M15.165 18.956a2.528 2.528 0 0 1 2.521 2.522A2.528 2.528 0 0 1 15.165 24a2.528 2.528 0 0 1-2.52-2.522v-2.522h2.52zm0-1.27a2.528 2.528 0 0 1-2.52-2.522 2.528 2.528 0 0 1 2.52-2.52h6.313A2.528 2.528 0 0 1 24 15.165a2.528 2.528 0 0 1-2.522 2.521h-6.313z" fill="#ECB22E"/>
    </svg>
    Sign in with Slack
  </a>

  <div class="footer">
    Restricted to @patrickaccounting.com and @whirks.com accounts
  </div>
</div>

<script>
  var AUTH_BASE = "https://standing-malamute-183.convex.site";

  // Check for error in URL
  var params = new URLSearchParams(window.location.search);
  var error = params.get("error");
  if (error) {
    var errorEl = document.getElementById("errorMsg");
    var messages = {
      "unauthorized_domain": "Your email domain is not authorized. Only @patrickaccounting.com and @whirks.com accounts can sign in.",
      "no_email": "Could not retrieve your email from Slack. Please try again.",
      "token_exchange_failed": "Authentication failed. Please try again.",
      "access_denied": "You denied the sign-in request.",
      "no_code": "No authorization code received. Please try again.",
    };
    errorEl.textContent = messages[error] || "Sign-in failed: " + error;
    errorEl.style.display = "block";
  }

  // If already authenticated, redirect to dashboard
  var token = localStorage.getItem("pats_session_token");
  if (token) {
    fetch(AUTH_BASE + "/auth/verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: token }),
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.valid) {
        window.location.href = params.get("redirect") || "/";
      }
    })
    .catch(function() {});
  }

  // Set up Slack button
  var redirect = params.get("redirect") || "/";
  var slackUrl = AUTH_BASE + "/auth/slack?redirect=" + encodeURIComponent("https://dashboards.patrickaccounting.com" + redirect);
  document.getElementById("slackBtn").href = slackUrl;
</script>
</body>
</html>
