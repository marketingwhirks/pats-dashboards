<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing in...</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    background:#0d1117;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:#e0e0e0;
  }
  .status {
    text-align:center;
  }
  .spinner {
    width:40px; height:40px;
    border:3px solid rgba(74,144,226,0.2);
    border-top-color:#4a90e2;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:0 auto 16px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .msg { font-size:16px; color:#aaa; }
</style>
</head>
<body>
<div class="status">
  <div class="spinner"></div>
  <div class="msg" id="msg">Completing sign-in...</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  const redirect = params.get("redirect") || "/";

  if (token) {
    localStorage.setItem("pats_session_token", token);
    // Quick verify before redirect
    fetch("https://standing-malamute-183.convex.site/auth/verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.valid && data.user) {
        localStorage.setItem("pats_user", JSON.stringify(data.user));
        window.location.href = redirect;
      } else {
        document.getElementById("msg").textContent = "Session invalid. Redirecting to login...";
        localStorage.removeItem("pats_session_token");
        setTimeout(() => { window.location.href = "/login.html"; }, 1500);
      }
    })
    .catch(() => {
      // Token stored, redirect anyway - will verify on next page
      window.location.href = redirect;
    });
  } else {
    document.getElementById("msg").textContent = "No token received. Redirecting to login...";
    setTimeout(() => { window.location.href = "/login.html"; }, 1500);
  }
</script>
</body>
</html>
